<div class="chat-container">
  <!-- Header -->
  <div class="chat-header">
    <h1>Assistant IA</h1>
  </div>

  <!-- Zone d'erreur -->
  <div *ngIf="error()" class="error-toast">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="12" y1="8" x2="12" y2="12"></line>
      <line x1="12" y1="16" x2="12.01" y2="16"></line>
    </svg>
    {{ error() }}
  </div>

  <!-- Messages Area -->
  <div class="messages-area">
    <!-- Document Summary Section -->
    <div *ngIf="documentSummary() && showSummary()" class="summary-card">
      <div class="summary-header">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 7h16M4 12h16M4 17h16"></path>
        </svg>
        <span>Résumé du document</span>
        <button (click)="showSummary.set(false)" class="close-btn" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="summary-content">{{ documentSummary() }}</div>
    </div>

    <!-- Empty state -->
    <div *ngIf="responses().length === 0 && !documentSummary()" class="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
      <p>Commencez une conversation</p>
    </div>

    <!-- Messages -->
    <div *ngFor="let response of responses()" class="message-group">
      <!-- User message -->
      <div class="message user-msg">
        <div class="msg-content">{{ response.question }}</div>
      </div>

      <!-- Bot message -->
      <div class="message bot-msg">
        <div class="bot-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <rect x="3" y="3" width="18" height="18" rx="2"></rect>
            <path d="M9 9h6v2H9V9zm0 4h6v2H9v-2z" fill="white"></path>
          </svg>
        </div>
        <div class="msg-content">{{ response.answer }}</div>
      </div>

      <!-- Sources et timing -->
      <div class="msg-footer">
        <span class="response-time">{{ response.time.toFixed(1) }}s</span>
        <details class="sources-dropdown">
          <summary>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
            {{ response.sources.length }} source(s)
          </summary>
          <ul class="sources-list">
            <li *ngFor="let source of response.sources">{{ source.substring(0, 100) }}...</li>
          </ul>
        </details>
      </div>
    </div>
  </div>

  <!-- Upload section -->
  <div class="upload-area">
    <input 
      type="file" 
      id="pdfInput"
      accept=".pdf"
      (change)="onFileSelected($event)"
      [disabled]="uploading()"
      class="file-input-hidden">
    <label for="pdfInput" class="upload-label">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="17 8 12 3 7 8"></polyline>
        <line x1="12" y1="3" x2="12" y2="15"></line>
      </svg>
      <span *ngIf="!selectedFile()">Ajouter un PDF</span>
      <span *ngIf="selectedFile()" class="file-name">{{ selectedFile()?.name }}</span>
    </label>
    <button 
      *ngIf="selectedFile()" 
      (click)="uploadPDF()"
      [disabled]="uploading()"
      class="upload-btn"
      type="button">
      {{ uploading() ? '...' : 'Télécharger' }}
    </button>
  </div>

  <!-- Input area -->
  <div class="input-area">
    <div class="input-group">
      <textarea
        [formControl]="questionControl"
        (keypress)="onKeyPress($event)"
        placeholder="Posez une question..."
        [readonly]="loading()"
        class="input-field">
      </textarea>
      <button 
        (click)="sendQuestion()"
        [disabled]="!canSendQuestion()"
        class="submit-btn"
        type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M16.6915026,12.4744748 L3.50612381,13.2599618 C3.19218622,13.2599618 3.03521743,13.4170592 3.03521743,13.5741566 L1.15159189,20.0151496 C0.8376543,20.8006365 0.99,21.89 1.77946707,22.52 C2.41,22.99 3.50612381,23.1 4.13399899,22.9429026 L21.714504,14.0454487 C22.6563168,13.5741566 23.1272231,12.6315722 22.9702544,11.6889879 L4.13399899,1.02647512 C3.34915502,0.9 2.40734225,0.9 1.77946707,1.3123556 C0.994623095,1.89 0.837654326,2.98 1.15159189,3.77546857 L3.03521743,10.2164615 C3.03521743,10.3735589 3.34915502,10.5306562 3.50612381,10.5306562 L16.6915026,11.3161431 C16.6915026,11.3161431 17.1624089,11.3161431 17.1624089,10.8448511 L17.1624089,12.4744748 C17.1624089,12.4744748 17.1624089,12.4744748 16.6915026,12.4744748 Z"></path>
        </svg>
      </button>
    </div>
    <button 
      (click)="clearHistory()"
      [disabled]="responses().length === 0"
      class="clear-history-btn"
      type="button"
      title="Effacer l'historique">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="3 6 5 4 21 4"></polyline>
        <path d="M19 4v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V4m3 0V3h8v1M10 9v6m4-6v6"></path>
      </svg>
    </button>
  </div>
</div>
